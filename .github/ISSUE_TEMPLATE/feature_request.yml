name: Feature request
description: Suggest a new capability or an improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep proposals aligned with the project's scope and content rules (every fact is
        sourced, wording stays neutral, polls stay informal). See CONTRIBUTING.md.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the behavior, not necessarily the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why you set them aside.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else: links, mockups, related issues.
