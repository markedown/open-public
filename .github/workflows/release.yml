name: Release

on:
  push:
    tags: ["v*"]

# Publish the container image to GHCR and attest its provenance. id-token and
# attestations are required by actions/attest-build-provenance.
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  docker:
    name: build, push, and attest image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build timestamp
        id: build_meta
        run: echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build_meta.outputs.built_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Attest that this commit, built by this public workflow, produced this
      # exact image digest. Anyone can verify with `gh attestation verify`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summarize image digest
        run: |
          {
            echo "## Image published"
            echo ""
            echo "- Repository: \`ghcr.io/${{ github.repository }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "Pull by digest:"
            echo ""
            echo "    docker pull ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
