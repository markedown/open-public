name: Release

on:
  push:
    tags: ["v*"]

# Publish the container image to GHCR and attest its provenance. id-token and
# attestations are required by actions/attest-build-provenance; contents write
# is required only to publish the tag's GitHub Release.
permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  docker:
    name: build, push, and attest image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build timestamp
        id: build_meta
        run: echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build_meta.outputs.built_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Attest that this commit, built by this public workflow, produced this
      # exact image digest. Anyone can verify with `gh attestation verify`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Publish the tag's GitHub Release so the version history is visible in the
      # repository itself, not only in this workflow's log. The attested digest
      # is recorded in the body, tying the release to the exact published image.
      # Uses the pre-installed gh CLI, so no extra action is trusted here.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; leaving it unchanged."
            exit 0
          fi
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" --verify-tag --generate-notes
          {
            gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body
            printf '\n---\n\nAttested image: `%s@%s`\n' "$IMAGE" "$DIGEST"
          } > release-notes.md
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md

      - name: Summarize image digest
        run: |
          {
            echo "## Image published"
            echo ""
            echo "- Repository: \`ghcr.io/${{ github.repository }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "Pull by digest:"
            echo ""
            echo "    docker pull ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
