name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: no CI job needs write access to the repository.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Compile-time-checked queries build from the committed .sqlx cache,
  # so no job needs a database at build time (or any secret).
  SQLX_OFFLINE: "true"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  data:
    name: dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      # The export the last commit published, to compare row counts against. The
      # validator can only tell a correction from an accident by looking at what
      # was there before, and without this its shrink check never runs at all.
      - name: the previously published manifest
        run: |
          git fetch --depth=1 origin "${{ github.event.pull_request.base.sha || github.event.before }}" \
            && git show FETCH_HEAD:dataset/manifest.json > "$RUNNER_TEMP/before.json" \
            || echo "no previous manifest to compare against"
      # The published dataset claims that every fact cites a source, that no
      # personal or unreviewed field is in it, that every reference resolves,
      # and that it holds the files it says it holds. This is that claim,
      # checked.
      - run: |
          if [ -f "$BEFORE" ]; then
            python3 scripts/validate_data.py dataset --baseline "$BEFORE"
          else
            echo "no previous manifest; checking this export on its own"
            python3 scripts/validate_data.py dataset
          fi
        env:
          BEFORE: ${{ runner.temp }}/before.json

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: open_public
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/open_public
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: sqlx-cli@0.9.0
      - name: Run migrations
        run: sqlx migrate run
      - name: Test
        run: cargo test --workspace

  build:
    name: build (release + css)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build CSS
        run: ./scripts/tailwind.sh
      - name: Build release binary
        run: cargo build --release --workspace

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: open_public
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/open_public
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: cargo-llvm-cov,sqlx-cli@0.9.0
      - name: Run migrations
        run: sqlx migrate run
      # Binary entrypoints (main.rs) bind sockets and serve; they are not
      # unit-testable and are excluded from the coverage gate.
      #
      # The gate is set to the reachable maximum. The lines below it are
      # defensive error paths (a database or filesystem failure, a "cannot
      # happen" guard) that no test can execute without failure injection, and
      # the pinned stable toolchain has no per-line coverage-exclusion. Raising
      # the gate further would require either that or nightly-only tooling.
      - name: Coverage
        run: cargo llvm-cov --workspace --ignore-filename-regex 'main\.rs' --fail-under-lines 97.5
